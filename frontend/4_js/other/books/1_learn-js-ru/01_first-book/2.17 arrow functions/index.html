<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <script>
    let sum = (a, b) => a + b;

    alert(sum(2, 4));

    let double = n => n * n;

    alert(double(4));

    let say = () => alert('hello world');
    say();

    let doubleSum = (a, b) => {
      let result = a + b;
      return result + result;
    };
    alert(doubleSum(2, 2));
  </script>
</body>
</html>
