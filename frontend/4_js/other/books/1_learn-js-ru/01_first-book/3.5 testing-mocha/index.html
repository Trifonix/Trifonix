<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/mocha/3.2.0/mocha.css"> <!-- добавим стили mocha для отображения результатов -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mocha/3.2.0/mocha.js"></script> <!-- добавляем сам фреймворк mocha -->
  <script>mocha.setup('bdd');</script> <!--  включаем режим тестирования в стиле BDD -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chai/3.5.0/chai.js"></script> <!-- добавим chai -->
  <script>let assert = chai.assert;</script> <!-- chai предоставляет большое количество функций. Объявим assert глобально -->
</head>

<body>

  <script>
    function pow(x, n) {
      if (n < 0) return NaN;
      if (Math.round(n) != n) return NaN;
    
      let result = 1;

      for (let i = 0; i < n; i++) {
        result *= x;
      }

      return result;
    }
  </script>

  <!-- скрипт со спецификацией (describe, it...) -->
  <script src="test.js"></script>

  <!-- элемент с id="mocha" будет содержать результаты тестов -->

  <!-- запускаем тесты! -->
  <script>
    mocha.run();
  </script>
</body>
