<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <script>
    function User(name) {
      this.name = name;

      this.sayHi = function() {
        alert("Меня зовут: " + this.name);
      };
    }

    let john = new User("John");

    john.sayHi();                 // Выведет "Меня зовут: John"
  </script>
</body>
</html>
