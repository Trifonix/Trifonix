<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <script>
    function User(name) {         // Имя конструктора с большой буквы
      this.name = name;
      this.isAdmin = false;
    }

    let user = new User("Jack");  // Вызов конструктора через ключевое слово new

    alert(user.name);
    alert(user.isAdmin);
  </script>
</body>
</html>
