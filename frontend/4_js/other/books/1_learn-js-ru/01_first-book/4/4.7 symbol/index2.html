<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let id = Symbol("id");
        let user = {
            name: "Smith",
            age: 33,
            [id]: 2000
        };

        for (let key in user) alert(key);

        alert("Напрямую: " + user[id]);
    </script>
</body>
</html>
