<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- Function Declaration -->
    <script>
        function sayHi() {
            alert('Hi');
        }
    </script>

    <!-- Function Expression -->
    <script>
        let funcExpression = function() {
            alert('Hi!');
        };
    </script>

    <script>
        alert(sayHi);
    </script>
</body>
</html>
