<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function checkAge(age) {
            if (age >= 21) {
                return true;
            } else {
                return false;
            }
        }
        
        function showMovie(age) {
            if (!checkAge(age)) {
                alert('извините, нельзя ;(')
                return;
            }
            alert('Приятного просмотра!');
        }

        showMovie(20);
    </script>
</body>
</html>
