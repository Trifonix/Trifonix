    <script>
        // Функция min(a, b)

        // Напишите функцию min(a,b), которая возвращает меньшее из чисел a и b.

        function min(a, b) {
            return a > b ? b : a;
        }

        // min(2, 5) == 2
        // min(3, -1) == -1
        // min(1, 1) == 1
