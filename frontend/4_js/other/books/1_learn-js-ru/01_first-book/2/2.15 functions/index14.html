<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function checkAge(age) {
            if (age >= 18) {
                return true;
            } else {
                return confirm('А родители точно разрешили?');
            }
        }

        let age = prompt('Сколько Вам лет?', 14);

        if (checkAge(age)) {
            alert('Заходите!');
        } else {
            alert('УХОДИТЕ ОТСЮДА!!!');
        }
    </script>
</body>
</html>
