<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function ask(question, yes, no) {
            if (confirm(question)) yes()
            else no();
        }

        function showOk() {
            alert("Вы согласны.");
        }

        function showCancel() {
            alert("Вы отменили выполнение.");
        }

        ask("Вы согласны?", showOk, showCancel); // Аргументы showOk и showCancel - колбэки
    </script>
</body>
</html>
